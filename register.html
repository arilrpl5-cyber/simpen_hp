<style>
  body { font-family: 'DM Sans', sans-serif; }
  .lamp-off { opacity: 0; filter: blur(8px); pointer-events: none; transform: translateX(-10px); }
  .lamp-on  { opacity: 1; filter: blur(0);   pointer-events: all;  transform: translateX(0); }
  .shade {
    width: 0; height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 40px solid #5a4a2a;
    transition: border-bottom-color 0.5s;
    position: relative;
  }
  .shade.on { border-bottom-color: #7a6030; }
  .shade::after {
    content: '';
    position: absolute;
    top: 2px; left: -30px;
    width: 0; height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 34px solid rgba(255,255,255,0.04);
  }
  .cone {
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 90px solid transparent;
    border-right: 90px solid transparent;
    border-top: 220px solid rgba(255,220,80,0.07);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.7s;
  }
  .cone.on { opacity: 1; }
  .strength-fill { transition: width 0.4s ease, background-color 0.4s ease; }
</style>
